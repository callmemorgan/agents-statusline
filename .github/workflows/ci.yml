name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout 5m

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dev dependencies (Biome)
        run: npm install --no-audit --no-fund

      - name: Biome check (lint + format)
        run: npx biome check

      # Type-check the pi extension against pi's published type packages so
      # the shim doesn't silently drift from the ExtensionAPI it targets.
      # Installed transiently (--no-save) to keep local `npm install` light.
      - name: Type-check pi extension
        run: |
          npm install --no-save --no-audit --no-fund \
            @earendil-works/pi-coding-agent@* \
            @earendil-works/pi-tui@* \
            @earendil-works/pi-ai@* \
            @types/node
          npx -y -p typescript@5 tsc --strict --noEmit --skipLibCheck \
            --moduleResolution bundler --module esnext --target es2022 --lib es2022 \
            --types node \
            npm/claude-statusline/extensions/pi-statusline.ts